<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — PawCare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FDF8F2;
    --sage: #7A9E7E;
    --sage-dark: #4A6B4E;
    --sage-light: #C8DEC9;
    --charcoal: #2C2C2A;
    --muted: #7A7A72;
    --border: rgba(44,44,42,0.1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .auth-container {
    background: white;
    padding: 3rem;
    border-radius: 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 16px 40px rgba(44,44,42,0.08);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--charcoal);
    text-decoration: none;
    display: block;
    text-align: center;
    margin-bottom: 2rem;
  }
  .logo span { color: var(--sage-dark); }

  .flash {
    padding: 0.8rem;
    border-radius: 8px;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
    text-align: center;
  }
  .flash.success { background: #EAF3DE; color: #3B6D11; }
  .flash.error { background: #FDE8E8; color: #9B1C1C; }
  .flash.info { background: #E1EFFE; color: #1E429F; }

  .form-group { margin-bottom: 1.5rem; }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .form-group input {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--charcoal);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--sage-dark); }

  .btn-submit {
    width: 100%;
    background: var(--sage-dark);
    color: white;
    border: none;
    padding: 1rem;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-submit:hover { background: #3c5740; }

  .auth-link {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .auth-link a {
    color: var(--sage-dark);
    text-decoration: none;
    font-weight: 600;
  }
  .auth-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="auth-container">
  <a href="/" class="logo">Paw<span>Care</span></a>
  
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form action="{{ url_for('signup') }}" method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" required placeholder="John Doe">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required placeholder="name@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn-submit">Sign Up</button>
  </form>

  <div class="auth-link">
    Already have an account? <a href="{{ url_for('login') }}">Login</a>
  </div>
</div>

</body>
</html>
